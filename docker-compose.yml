version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_GPU=1
      - OLLAMA_FLASH_ATTENTION=1
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

  api:
    build: ./api
    container_name: api
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./data/docs:/app/data/docs
    environment:
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - CHAT_MODEL=llama3:8b
      - EMBED_MODEL=nomic-embed-text
      - QDRANT_COLLECTION=kb_chunks
      - OPENWEBUI_MODEL_ID=llama3_8b
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=100

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://api:8000/v1
      - OPENAI_API_KEY=devkey
    depends_on:
      api:
        condition: service_started
    volumes:
      - openwebui_data:/app/backend/data

volumes:
  qdrant_storage: {}
  ollama_models: {}
  openwebui_data: {}
